<!DOCTYPE html>

<html class="light dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Smooth Moves - Authentication</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">tailwind.config = {darkMode: "class", theme: {extend: {colors: {primary: "#2f4a81", "background-light": "#f6f7f8", "background-dark": "#14171e"}, fontFamily: {display: "Nunito Sans"}, borderRadius: {DEFAULT: "0.5rem", lg: "1rem", xl: "1.5rem", full: "9999px"}}}};</script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);

<body class="font-display bg-background-light dark:bg-background-dark text-[#111318] dark:text-white overflow-x-hidden antialiased">
<div class="relative flex h-auto min-h-screen w-full flex-col max-w-md mx-auto bg-white dark:bg-background-dark shadow-xl overflow-hidden">
<!-- Header -->
<div class="flex items-center p-4 pb-2 justify-between pt-8">
<div class="flex-1"></div> <!-- Spacer for centering -->
<div class="flex items-center gap-2">
<div class="flex items-center justify-center w-8 h-8 rounded-lg bg-primary/10 text-primary">
<span class="material-symbols-outlined">local_shipping</span>
</div>
<h2 class="text-[#111318] dark:text-white text-lg font-bold leading-tight tracking-[-0.015em]">Smooth Moves</h2>
</div>
<div class="flex-1"></div> <!-- Spacer for centering -->
</div>
<!-- Welcome Text -->
<div class="px-4 pb-6">
<p class="text-[#111318] dark:text-gray-300 text-base font-normal leading-normal text-center">
                Welcome back! Let's get you moving.
            </p>
</div>
<!-- Intent Selector (Segmented Button) -->
<div class="px-4 pb-6">
<div class="flex h-12 w-full items-center justify-center rounded-xl bg-[#f0f2f4] dark:bg-gray-800 p-1">
<label class="group relative flex cursor-pointer h-full flex-1 items-center justify-center overflow-hidden rounded-[10px] px-2 text-sm font-medium leading-normal transition-all">
<input checked="" class="peer invisible absolute w-0 h-0" name="move-type" type="radio" value="new"/>
<span class="z-10 truncate text-[#616f89] dark:text-gray-400 peer-checked:text-primary dark:peer-checked:text-primary font-semibold transition-colors">Start a New Move</span>
<div class="absolute inset-0 bg-white dark:bg-gray-700 shadow-sm opacity-0 peer-checked:opacity-100 transition-all duration-200 rounded-[10px] m-[2px]"></div>
</label>
<label class="group relative flex cursor-pointer h-full flex-1 items-center justify-center overflow-hidden rounded-[10px] px-2 text-sm font-medium leading-normal transition-all">
<input class="peer invisible absolute w-0 h-0" name="move-type" type="radio" value="join"/>
<span class="z-10 truncate text-[#616f89] dark:text-gray-400 peer-checked:text-primary dark:peer-checked:text-primary font-semibold transition-colors">Join an Existing Move</span>
<div class="absolute inset-0 bg-white dark:bg-gray-700 shadow-sm opacity-0 peer-checked:opacity-100 transition-all duration-200 rounded-[10px] m-[2px]"></div>
</label>
</div>
</div>
<!-- Tabs -->
<div class="pb-6">
<div class="flex border-b border-[#dbdfe6] dark:border-gray-700 px-6 justify-between gap-8">
<button class="flex flex-col items-center justify-center border-b-[3px] border-primary text-[#111318] dark:text-white pb-3 pt-2 flex-1 transition-colors">
<p class="text-sm font-bold leading-normal tracking-[0.015em]">Sign In</p>
</button>
<button class="flex flex-col items-center justify-center border-b-[3px] border-transparent text-[#616f89] dark:text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 pb-3 pt-2 flex-1 transition-colors">
<p class="text-sm font-bold leading-normal tracking-[0.015em]">Register</p>
</button>
</div>
</div>
<!-- Form Inputs -->
<div class="flex flex-col gap-5 px-4">
<!-- Email Field -->
<label class="flex flex-col w-full">
<p class="text-[#111318] dark:text-gray-200 text-sm font-medium leading-normal pb-2">Email Address</p>
<input class="form-input flex w-full min-w-0 resize-none overflow-hidden rounded-xl text-[#111318] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#dbdfe6] dark:border-gray-700 bg-white dark:bg-gray-800 focus:border-primary h-14 placeholder:text-[#616f89] dark:placeholder:text-gray-500 px-4 text-base font-normal leading-normal transition-all" placeholder="name@example.com" type="email"/>
</label>
<!-- Password Field -->
<label class="flex flex-col w-full relative">
<p class="text-[#111318] dark:text-gray-200 text-sm font-medium leading-normal pb-2">Password</p>
<div class="relative">
<input class="form-input flex w-full min-w-0 resize-none overflow-hidden rounded-xl text-[#111318] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#dbdfe6] dark:border-gray-700 bg-white dark:bg-gray-800 focus:border-primary h-14 placeholder:text-[#616f89] dark:placeholder:text-gray-500 pl-4 pr-12 text-base font-normal leading-normal transition-all" placeholder="Enter your password" type="password"/>
<button class="absolute right-0 top-0 h-full px-4 text-[#616f89] dark:text-gray-400 hover:text-primary transition-colors flex items-center justify-center">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</label>
<!-- Forgot Password -->
<div class="flex justify-end">
<a class="text-primary text-sm font-medium hover:underline" href="#">Forgot password?</a>
</div>
<!-- Primary Button -->
<button class="flex w-full items-center justify-center rounded-xl bg-primary py-4 text-white text-base font-bold leading-normal hover:bg-blue-600 transition-colors shadow-lg shadow-primary/20">
                Sign In
            </button>
</div>
<!-- Divider -->
<div class="px-4 py-6">
<div class="relative flex items-center">
<div class="flex-grow border-t border-[#dbdfe6] dark:border-gray-700"></div>
<span class="flex-shrink-0 mx-4 text-[#616f89] dark:text-gray-500 text-xs font-medium uppercase tracking-wider">Or continue with</span>
<div class="flex-grow border-t border-[#dbdfe6] dark:border-gray-700"></div>
</div>
</div>
<!-- Social Login -->
<div class="px-4 pb-6">
<button class="flex w-full items-center justify-center gap-3 rounded-xl border border-[#dbdfe6] dark:border-gray-700 bg-white dark:bg-gray-800 py-3.5 text-[#111318] dark:text-white text-base font-medium leading-normal hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
<div class="w-5 h-5 relative flex items-center justify-center" data-alt="Google Logo">
<!-- Custom SVG for Google Logo to avoid external image dependency issues -->
<svg height="20" viewbox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg">
<g transform="matrix(1, 0, 0, 1, 27.009001, -39.238998)">
<path d="M -3.264 51.509 C -3.264 50.719 -3.334 49.969 -3.454 49.239 L -14.754 49.239 L -14.754 53.749 L -8.284 53.749 C -8.574 55.229 -9.424 56.479 -10.684 57.329 L -10.684 60.329 L -6.824 60.329 C -4.564 58.239 -3.264 55.159 -3.264 51.509 Z" fill="#4285F4"></path>
<path d="M -14.754 63.239 C -11.514 63.239 -8.804 62.159 -6.824 60.329 L -10.684 57.329 C -11.764 58.049 -13.134 58.489 -14.754 58.489 C -17.884 58.489 -20.534 56.379 -21.484 53.529 L -25.464 53.529 L -25.464 56.619 C -23.494 60.539 -19.444 63.239 -14.754 63.239 Z" fill="#34A853"></path>
<path d="M -21.484 53.529 C -21.734 52.809 -21.864 52.039 -21.864 51.239 C -21.864 50.439 -21.724 49.669 -21.484 48.949 L -21.484 45.859 L -25.464 45.859 C -26.284 47.479 -26.754 49.299 -26.754 51.239 C -26.754 53.179 -26.284 54.999 -25.464 56.619 L -21.484 53.529 Z" fill="#FBBC05"></path>
<path d="M -14.754 43.989 C -12.984 43.989 -11.404 44.599 -10.154 45.789 L -6.734 42.369 C -8.804 40.429 -11.514 39.239 -14.754 39.239 C -19.444 39.239 -23.494 41.939 -25.464 45.859 L -21.484 48.949 C -20.534 46.099 -17.884 43.989 -14.754 43.989 Z" fill="#EA4335"></path>
</g>
</svg>
</div>
                Sign in with Google
            </button>
</div>
<!-- Footer -->
<div class="mt-auto px-4 pb-8 pt-4">
<p class="text-[#616f89] dark:text-gray-400 text-sm font-normal text-center">
                Don't have an account? 
                <a class="text-primary font-bold hover:underline ml-1" href="#">Sign Up</a>
</p>
</div>
</div>
</body></html>
