# Settings for Backend (on Cloud Run).
# See https://firebase.google.com/docs/app-hosting/configure#cloud-run
runConfig:
  minInstances: 1
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 512
  entrypoint: npm start

# Environment variables and secrets.
env:
  # Runtime environment variables
  - variable: NODE_ENV
    value: production
    availability:
      - BUILD
      - RUNTIME

  # Firebase configuration
  - variable: VITE_FIREBASE_API_KEY
    secret: smoothmoves-firebase-api-key
  - variable: VITE_FIREBASE_AUTH_DOMAIN
    secret: smoothmoves-firebase-auth-domain
  - variable: VITE_FIREBASE_PROJECT_ID
    value: smoothmoves-60679
  - variable: VITE_FIREBASE_STORAGE_BUCKET
    secret: smoothmoves-firebase-storage-bucket
  - variable: VITE_FIREBASE_MESSAGING_SENDER_ID
    secret: smoothmoves-firebase-messaging-sender-id
  - variable: VITE_FIREBASE_APP_ID
    secret: smoothmoves-firebase-app-id

# Build configuration
buildConfig:
  buildCommand: npm run build
  outputDirectory: dist

# Hosting configuration
hosting:
  public: dist
  ignore:
    - firebase.json
    - .firebaserc
    - .gitignore
    - README.md
    - node_modules/**
    - .env*
    - .vscode/**
    - .git/**
    - docs/**

# Grant access to secrets in Cloud Secret Manager.
# See https://firebase.google.com/docs/app-hosting/configure#secret-parameters
# - variable: MY_SECRET
#   secret: mySecretRef
