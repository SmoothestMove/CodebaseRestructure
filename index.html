<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script type="importmap">

      "react-dom/": "https://esm.sh/react-dom@^19.1.0/",

      "react-icons/io5": "https://esm.sh/react-icons@^5.5.0/io5",
      "react-icons/fc": "https://esm.sh/react-icons@^5.5.0/fc",

  <script src="https://cdn.jsdelivr.net/npm/qrious/dist/qrious.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    body {
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      /* background-color: #f1f5f9; /* slate-100 */ /* Tailwind class will handle this */
    }
    /* Fix for html5-qrcode focus ring */
    #qr-reader-default_dashboard_section_csr > div > button:focus, 
    div[id^="qr-reader-"] button:focus {
      outline: 2px solid transparent !important; 
      outline-offset: 2px !important;
      box-shadow: 0 0 0 2px var(--tw-ring-color, #ff7e00) !important; /* brand-tertiary focus */
    }
    .dark #qr-reader-default_dashboard_section_csr > div > button:focus, 
    .dark div[id^="qr-reader-"] button:focus {
      box-shadow: 0 0 0 2px var(--tw-ring-color, #ff7e00) !important; /* Ensure focus ring is visible in dark mode */
    }

    .glassmorphism {
      background: rgba(255, 255, 255, 0.65); 
      backdrop-filter: blur(12px) saturate(150%);
      -webkit-backdrop-filter: blur(12px) saturate(150%);
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1); 
    }

    .dark .glassmorphism {
        background: rgba(30, 41, 59, 0.65); /* Dark Mode Hex from table */
        border: 1px solid rgba(255, 255, 255, 0.1); /* Dark Mode Hex from table */
        /* box-shadow remains similar or slightly adjusted if needed */
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f5f9; /* slate-100 */
    }
    .dark ::-webkit-scrollbar-track {
      background: #1e293b; /* slate-800, Dark Mode Hex from table */
    }
    ::-webkit-scrollbar-thumb {
      background: #a0aec0; 
    }
    .dark ::-webkit-scrollbar-thumb {
      background: #475569; /* slate-600, Dark Mode Hex from table */
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #708090; /* brand-secondary */
    }
    .dark ::-webkit-scrollbar-thumb:hover {
      background: #64748b; /* slate-500, Dark Mode Hex from table */
    }
    
    .text-gradient-orange-peach {
      background-image: linear-gradient(to right, var(--tw-color-brand-tertiary), var(--tw-color-brand-accent));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .dark .text-gradient-orange-peach { /* Ensure visibility in dark mode, adjust if needed */
       background-image: linear-gradient(to right, #ff7e00, #e1a95f); /* Could be same or slightly adjusted */
    }


    /* Styles for QR Scanner Video and hiding default library elements */
    div[id^="qr-reader-"] > video {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
      display: block !important; 
      position: absolute !important; 
      top: 0 !important;
      left: 0 !important;
    }
    div[id^="qr-reader-default_dashboard_section_"],
    div[id^="qr-reader-default_dashboard_section_swaplink"],
    div[id^="qr-reader-default_dashboard_section_csr"] button,
    div[id^="qr-reader-default_dashboard_section_fsr"] button {
        display: none !important;
    }
    #html5-qrcode-anchor-scan-type-change,
    #html5-qrcode-button-camera-permission,
    #html5-qrcode-button-camera-stop,
    #html5-qrcode-button-camera-start {
        display: none !important; 
    }

    .scan-line-element::before {
      content: '';
      position: absolute;
      left: 0; 
      right: 0;
      height: 100%;
      background-color: var(--tracer-1-bg, transparent); 
      opacity: var(--tracer-1-opacity, 0); 
      transform: translateY(var(--tracer-1-offsetY, 0px));
      z-index: -1; 
      will-change: opacity, background-color;
    }
    .scan-line-element::after {
      content: '';
      position: absolute;
      left: 0; 
      right: 0;
      height: 100%;
      background-color: var(--tracer-2-bg, transparent); 
      opacity: var(--tracer-2-opacity, 0); 
      transform: translateY(var(--tracer-2-offsetY, 0px));
      z-index: -2; 
      will-change: opacity, background-color;
    }

  </style>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
</head>
<body class="bg-slate-100 dark:bg-slate-900"> 
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  
  <!-- Cache-busting and error recovery -->
  <script>
    // Add version parameter to force fresh load of resources
    const version = '1.0.0';
    
    // Function to reload with cache-busting
    function forceReload() {
      const url = new URL(window.location.href);
      url.searchParams.set('v', version + '.' + Date.now());
      window.location.href = url.toString();
    }

    // Detect if critical resources failed to load
    window.addEventListener('error', function(e) {
      // Filter out extension-related errors
      const extensionUrls = ['chrome-extension://', 'moz-extension://', 'safari-web-extension://'];
      const resourceUrl = e.target?.src || e.target?.href || '';
      const isExtensionError = extensionUrls.some(prefix => resourceUrl.includes(prefix));
      
      if (isExtensionError) {
        console.log('Ignoring extension resource error:', resourceUrl);
        return; // Don't trigger reload for extension errors
      }
      
      // Check if it's a resource loading error
      if (e.target !== window) {
        console.log('Resource failed to load:', resourceUrl);
        // Show a user-visible message
        const root = document.getElementById('root');
        if (root) {
          root.innerHTML = `
            <div class="fixed inset-0 bg-white dark:bg-slate-900 flex items-center justify-center p-4">
              <div class="text-center max-w-md">
                <h2 class="text-xl font-bold mb-4 text-brand-primary dark:text-white">Loading Issue Detected</h2>
                <p class="mb-6 text-slate-600 dark:text-slate-300">We're having trouble loading the app. Refreshing in 2 seconds...</p>
                <button onclick="forceReload()" class="px-4 py-2 bg-brand-tertiary text-white rounded-md hover:bg-opacity-90 transition-colors">
                  Refresh Now
                </button>
              </div>
            </div>
          `;
        }
        // Auto-refresh after a brief delay
        setTimeout(forceReload, 2000);
      }
    }, true); // Use capture phase to catch more errors

    // Detect unhandled JavaScript errors
    window.addEventListener('unhandledrejection', function(e) {
      console.log('Unhandled promise rejection:', e.reason);
      
      // Filter out common browser extension errors that shouldn't trigger app reload
      const ignoredErrors = [
        'backgroundScript.runPageLoadHook',
        'Extension context invalidated',
        'chrome-extension://',
        'moz-extension://',
        'Script error',
        'Non-Error promise rejection captured'
      ];
      
      const errorString = String(e.reason);
      const shouldIgnore = ignoredErrors.some(ignored => errorString.includes(ignored));
      
      if (shouldIgnore) {
        console.log('Ignoring browser extension error:', errorString);
        return; // Don't trigger reload for extension errors
      }
      
      // Show a user-visible message for actual app errors
      const root = document.getElementById('root');
      if (root) {
        root.innerHTML = `
          <div class="fixed inset-0 bg-white dark:bg-slate-900 flex items-center justify-center p-4">
            <div class="text-center max-w-md">
              <h2 class="text-xl font-bold mb-4 text-brand-primary dark:text-white">Something Went Wrong</h2>
              <p class="mb-6 text-slate-600 dark:text-slate-300">We've encountered an issue. Refreshing in 2 seconds...</p>
              <button onclick="forceReload()" class="px-4 py-2 bg-brand-tertiary text-white rounded-md hover:bg-opacity-90 transition-colors">
                Refresh Now
              </button>
            </div>
          </div>
        `;
      }
      setTimeout(forceReload, 2000);
    });

    // Add a version parameter to all script and link tags to prevent caching
    document.addEventListener('DOMContentLoaded', function() {
      const versionParam = 'v=' + version + '.' + Date.now();
      
      // Update script tags
      document.querySelectorAll('script[src]').forEach(script => {
        if (!script.src.includes('?')) {
          script.src += '?' + versionParam;
        } else if (!script.src.includes('v=')) {
          script.src += '&' + versionParam;
        }
      });
      
      // Update link tags (for CSS, etc.)
      document.querySelectorAll('link[rel="stylesheet"][href]').forEach(link => {
        if (!link.href.includes('?')) {
          link.href += '?' + versionParam;
        } else if (!link.href.includes('v=')) {
          link.href += '&' + versionParam;
        }
      });
    });
  </script>
</body>
</html>
